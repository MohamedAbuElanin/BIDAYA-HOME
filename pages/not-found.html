<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="page_not_found">الصفحة غير موجودة | بداية هوم</title>
  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Core stylesheet -->
  <link rel="stylesheet" href="../assets/css/style.css">
  
  <style>
    .notfound-container {
      max-width: 600px;
      margin: 80px auto;
      text-align: center;
      padding: 0 24px;
    }
    
    .notfound-icon {
      font-size: 100px;
      color: var(--accent);
      margin-bottom: 30px;
      display: inline-block;
      animation: bounce 2s infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    
    .notfound-title {
      font-size: 32px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 16px;
    }
    
    .notfound-desc {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 32px;
      line-height: 1.8;
    }
  </style>
</head>
<body>

  <!-- Sticky Header -->
  <header id="global-header"></header>

  <main class="container">
    <div class="notfound-container">
      <div class="notfound-icon">
        <i class="fa-solid fa-house-circle-xmark"></i>
      </div>
      
      <h1 class="notfound-title" data-i18n="page_not_found">الصفحة غير موجودة</h1>
      
      <p class="notfound-desc" data-i18n="page_not_found_desc">
        عذراً، الصفحة التي تبحث عنها قد تم نقلها، أو حذفها، أو أنها لم تكن موجودة في الأصل. يرجى التحقق من الرابط أو العودة للصفحة الرئيسية.
      </p>
      
      <a href="../index.html" class="btn btn-primary" style="padding: 14px 40px;" data-i18n="back_home">
        <i class="fa-solid fa-house-chimney"></i>
        <span>العودة للرئيسية</span>
      </a>
    </div>
  </main>

  <!-- Global Footer -->
  <footer id="global-footer"></footer>

  <!-- Scripts -->
  <script src="../js/products-data.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
