<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="cart_title">عربة التسوق | بداية هوم</title>
  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Core stylesheet -->
  <link rel="stylesheet" href="../assets/css/style.css">
  
  <style>
    /* Cart Page Specific CSS */
    .cart-layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 30px;
      margin-top: 30px;
    }
    
    .cart-items-section {
      background-color: white;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 24px;
    }
    
    .cart-table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .cart-table th {
      text-align: start;
      padding-bottom: 16px;
      border-bottom: 1.5px solid var(--border-color);
      color: var(--text-muted);
      font-weight: 600;
      font-size: 14px;
    }
    
    .cart-row {
      border-bottom: 1px solid var(--border-color);
    }
    
    .cart-row:last-child {
      border-bottom: none;
    }
    
    .cart-row td {
      padding: 20px 0;
      vertical-align: middle;
    }
    
    .cart-product-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .cart-product-img {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-color);
      overflow: hidden;
      flex-shrink: 0;
      background-color: #F8F8F6;
    }
    
    .cart-product-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .cart-product-name {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      display: block;
      margin-bottom: 4px;
    }
    
    .cart-product-name:hover {
      color: var(--primary);
    }
    
    .cart-product-cat {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    
    .cart-qty-selector {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    
    .cart-qty-btn {
      width: 32px;
      height: 32px;
      background-color: #F8F8F6;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
    
    .cart-qty-btn:hover {
      background-color: var(--border-color);
    }
    
    .cart-qty-input {
      width: 40px;
      text-align: center;
      font-weight: bold;
      font-size: 14px;
    }
    
    .cart-price-cell {
      font-weight: 700;
      font-size: 15px;
    }
    
    .cart-remove-btn {
      color: var(--danger);
      font-size: 16px;
      cursor: pointer;
      padding: 8px;
      border-radius: var(--radius-full);
      transition: var(--transition);
    }
    
    .cart-remove-btn:hover {
      background-color: rgba(211, 47, 47, 0.08);
    }
    
    /* Summary Panel */
    .summary-panel {
      background-color: white;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 24px;
      align-self: start;
    }
    
    .summary-title {
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 20px;
      color: var(--primary);
      border-bottom: 1.5px solid var(--border-color);
      padding-bottom: 12px;
    }
    
    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
      font-size: 15px;
    }
    
    .summary-row.total {
      border-top: 1.5px solid var(--border-color);
      padding-top: 16px;
      font-weight: 800;
      font-size: 18px;
      color: var(--primary);
    }
    
    @media (max-width: 992px) {
      .cart-layout {
        grid-template-columns: 1fr;
      }
      
      .cart-table th:nth-child(2),
      .cart-table td:nth-child(2) {
        display: none; /* Hide single item price column on mobile */
      }
    }
  </style>
</head>
<body>

  <!-- Sticky Header -->
  <header id="global-header"></header>

  <main class="container" style="padding-top: 30px;">
    <!-- Breadcrumb -->
    <div class="breadcrumb">
      <a href="../index.html" data-i18n="nav_home">الرئيسية</a>
      <span class="breadcrumb-separator">/</span>
      <span data-i18n="cart_title">عربة التسوق</span>
    </div>

    <h1 style="font-weight: 800; font-size:28px; color:var(--primary);" data-i18n="cart_title">عربة التسوق</h1>

    <div class="cart-layout" id="cart-content-wrapper">
      <!-- Dynamically filled: either Items Grid + Summary OR Empty State -->
    </div>
  </main>

  <!-- Global Footer -->
  <footer id="global-footer"></footer>

  <!-- Scripts -->
  <script src="../js/products-data.js"></script>
  <script src="../js/main.js"></script>
  
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      renderCartPage();

      // Listen for global cart modifications to redraw page instantly
      window.addEventListener("cartUpdated", renderCartPage);
    });

    function renderCartPage() {
      const container = document.getElementById("cart-content-wrapper");
      if (!window.BIDAYA_DATA || !window.BIDAYA_APP) return;

      const cartItems = BIDAYA_APP.cart.get();
      const products = window.BIDAYA_DATA.products;
      const lang = window.BIDAYA_APP.currentLang();

      if (cartItems.length === 0) {
        // Render empty state
        container.style.display = "block";
        container.innerHTML = `
          <div class="empty-state card-outline" style="background-color: white; border: 1px solid var(--border-color); border-radius: var(--radius-md);">
            <i class="fa-solid fa-shopping-bag empty-state-icon"></i>
            <h3 class="empty-state-title" data-i18n="cart_empty">${BIDAYA_APP.translations[lang]["cart_empty"]}</h3>
            <p style="color:var(--text-muted); margin-bottom: 24px;">تصفح أقسامنا المميزة وأضف أفضل الأدوات المنزلية لعربتك.</p>
            <a href="products.html" class="btn btn-primary" data-i18n="cart_continue">${BIDAYA_APP.translations[lang]["cart_continue"]}</a>
          </div>
        `;
        return;
      }

      container.style.display = "grid";
      
      // Calculate subtotals
      const subtotal = BIDAYA_APP.cart.total();
      const shippingText = lang === "ar" ? "يُحدد عند الشحن" : "Calculated at checkout";

      // Render items table
      const rowsHTML = cartItems.map(item => {
        const prod = products.find(p => p.id === item.id);
        if (!prod) return '';
        const name = lang === "ar" ? prod.nameAr : prod.nameEn;
        const totalItemPrice = prod.price * item.qty;

        return `
          <tr class="cart-row">
            <td>
              <div class="cart-product-info">
                <div class="cart-product-img">
                  <img src="${prod.image}" alt="${name}">
                </div>
                <div>
                  <a href="products-details.html?id=${prod.id}" class="cart-product-name">${name}</a>
                  <span class="cart-product-cat">${prod.category}</span>
                </div>
              </div>
            </td>
            <td class="cart-price-cell">${prod.price} EGP</td>
            <td>
              <div class="cart-qty-selector">
                <button class="cart-qty-btn" onclick="BIDAYA_APP.cart.updateQty('${prod.id}', ${item.qty - 1})"><i class="fa-solid fa-minus"></i></button>
                <input type="text" class="cart-qty-input" value="${item.qty}" readonly>
                <button class="cart-qty-btn" onclick="BIDAYA_APP.cart.updateQty('${prod.id}', ${item.qty + 1})"><i class="fa-solid fa-plus"></i></button>
              </div>
            </td>
            <td class="cart-price-cell" style="color: var(--primary);">${totalItemPrice} EGP</td>
            <td style="text-align: center;">
              <button class="cart-remove-btn" onclick="BIDAYA_APP.cart.remove('${item.id}')" title="${BIDAYA_APP.translations[lang]["cart_remove"]}">
                <i class="fa-solid fa-trash-can"></i>
              </button>
            </td>
          </tr>
        `;
      }).join('');

      container.innerHTML = `
        <!-- Table Column -->
        <div class="cart-items-section">
          <table class="cart-table">
            <thead>
              <tr>
                <th style="width: 45%;">${lang === "ar" ? "المنتج" : "Product"}</th>
                <th style="width: 15%;">${lang === "ar" ? "السعر" : "Price"}</th>
                <th style="width: 20%;">${lang === "ar" ? "الكمية" : "Quantity"}</th>
                <th style="width: 15%;">${lang === "ar" ? "المجموع" : "Total"}</th>
                <th style="width: 5%; text-align: center;"></th>
              </tr>
            </thead>
            <tbody>
              ${rowsHTML}
            </tbody>
          </table>
        </div>
        
        <!-- Summary Column -->
        <div class="summary-panel">
          <h3 class="summary-title" data-i18n="checkout_summary">${BIDAYA_APP.translations[lang]["checkout_summary"]}</h3>
          
          <div class="summary-row">
            <span data-i18n="cart_subtotal">${BIDAYA_APP.translations[lang]["cart_subtotal"]}</span>
            <span style="font-weight: 700;">${subtotal} EGP</span>
          </div>
          
          <div class="summary-row">
            <span data-i18n="cart_shipping">${BIDAYA_APP.translations[lang]["cart_shipping"]}</span>
            <span style="color: var(--text-muted); font-size:13px;">${shippingText}</span>
          </div>
          
          <div class="summary-row total">
            <span data-i18n="cart_total">${BIDAYA_APP.translations[lang]["cart_total"]}</span>
            <span>${subtotal} EGP</span>
          </div>
          
          <div style="display: flex; flex-direction: column; gap:12px; margin-top:30px;">
            <a href="checkout.html" class="btn btn-primary" data-i18n="cart_checkout">${BIDAYA_APP.translations[lang]["cart_checkout"]}</a>
            <a href="products.html" class="btn btn-outline" data-i18n="cart_continue">${BIDAYA_APP.translations[lang]["cart_continue"]}</a>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
