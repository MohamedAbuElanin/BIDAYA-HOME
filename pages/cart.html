<head>
  <meta charset="UTF-8">

  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Core stylesheet -->
  <link rel="stylesheet" href="../assets/css/style.css">
  
  <style>
    /* Cart Page Specific CSS */
    .cart-layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 30px;
      margin-top: 30px;
    }
    
    .cart-items-section {
      background-color: white;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 24px;
    }
    
    .cart-table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .cart-table th {
      text-align: start;
      padding-bottom: 16px;
      border-bottom: 1.5px solid var(--border-color);
      color: var(--text-muted);
      font-weight: 600;
      font-size: 14px;
    }
    
    .cart-row {
      border-bottom: 1px solid var(--border-color);
    }
    
    .cart-row:last-child {
      border-bottom: none;
    }
    
    .cart-row td {
      padding: 20px 0;
      vertical-align: middle;
    }
    
    .cart-product-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .cart-product-img {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-color);
      overflow: hidden;
      flex-shrink: 0;
      background-color: #F8F8F6;
    }
    
    .cart-product-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .cart-product-name {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      display: block;
      margin-bottom: 4px;
    }
    
    .cart-product-name:hover {
      color: var(--primary);
    }
    
    .cart-product-cat {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    
    .cart-qty-selector {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    
    .cart-qty-btn {
      width: 32px;
      height: 32px;
      background-color: #F8F8F6;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
    
    .cart-qty-btn:hover {
      background-color: var(--border-color);
    }
    
    .cart-qty-input {
      width: 40px;
      text-align: center;
      font-weight: bold;
      font-size: 14px;
    }
    
    .cart-price-cell {
      font-weight: 700;
      font-size: 15px;
    }
    
    .cart-remove-btn {
      color: var(--danger);
      font-size: 16px;
      cursor: pointer;
      padding: 8px;
      border-radius: var(--radius-full);
      transition: var(--transition);
    }
    
    .cart-remove-btn:hover {
      background-color: rgba(211, 47, 47, 0.08);
    }
    
    /* Summary Panel */
    .summary-panel {
      background-color: white;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 24px;
      align-self: start;
    }
    
    .summary-title {
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 20px;
      color: var(--primary);
      border-bottom: 1.5px solid var(--border-color);
      padding-bottom: 12px;
    }
    
    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
      font-size: 15px;
    }
    
    .summary-row.total {
      border-top: 1.5px solid var(--border-color);
      padding-top: 16px;
      font-weight: 800;
      font-size: 18px;
      color: var(--primary);
    }
    
    @media (max-width: 992px) {
      .cart-layout {
        grid-template-columns: 1fr;
      }
      
      .cart-table th:nth-child(2),
      .cart-table td:nth-child(2) {
        display: none; /* Hide single item price column on mobile */
      }
    }
  </style>
</head>

    <div class="cart-layout" id="cart-content-wrapper">
      <!-- Dynamically filled: either Items Grid + Summary OR Empty State -->
    </div>
  </main>

  <!-- Global Footer -->
