  <style>
    /* Details Page Specific CSS */
    .details-layout {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 40px;
      margin-top: 30px;
    }
    
    .gallery-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .main-img-view {
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      overflow: hidden;
      background-color: white;
      aspect-ratio: 1.2;
    }
    
    .main-img-view img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: var(--transition);
    }
    
    .thumbnails-list {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
    }
    
    .thumb-item {
      width: 80px;
      height: 80px;
      border: 2px solid var(--border-color);
      border-radius: var(--radius-sm);
      overflow: hidden;
      cursor: pointer;
      flex-shrink: 0;
      transition: var(--transition);
      background-color: white;
    }
    
    .thumb-item.active, .thumb-item:hover {
      border-color: var(--accent);
      transform: scale(1.05);
    }
    
    .thumb-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    /* Product Info panel */
    .info-panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .details-category {
      font-size: 13px;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 600;
    }
    
    .details-name {
      font-size: 30px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1.3;
    }
    
    .details-price-wrapper {
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1.5px solid var(--border-color);
      padding-bottom: 20px;
    }
    
    .details-price-current {
      font-size: 26px;
      font-weight: 800;
      color: var(--primary);
    }
    
    .details-price-old {
      font-size: 18px;
      color: var(--text-light);
      text-decoration: line-through;
    }
    
    .stock-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--radius-full);
      font-size: 13px;
      font-weight: 600;
    }
    
    .stock-badge.in {
      background-color: rgba(46, 125, 50, 0.1);
      color: var(--success);
    }
    
    .stock-badge.out {
      background-color: rgba(211, 47, 47, 0.1);
      color: var(--danger);
    }
    
    .qty-adder-wrapper {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 10px 0;
    }
    
    .qty-selector {
      display: flex;
      align-items: center;
      border: 1.5px solid var(--border-color);
      border-radius: var(--radius-md);
      overflow: hidden;
      background-color: white;
    }
    
    .qty-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      background-color: #F8F8F6;
      transition: var(--transition);
    }
    
    .qty-btn:hover {
      background-color: var(--border-color);
    }
    
    .qty-input {
      width: 50px;
      text-align: center;
      font-weight: 700;
      font-size: 16px;
    }
    
    /* Technical specs and tabs */
    .description-tabs {
      margin-top: 50px;
      border-top: 1.5px solid var(--border-color);
      padding-top: 30px;
    }
    
    .tabs-header {
      display: flex;
      gap: 30px;
      border-bottom: 1.5px solid var(--border-color);
      margin-bottom: 24px;
    }
    
    .tab-btn {
      font-size: 18px;
      font-weight: 700;
      padding-bottom: 12px;
      cursor: pointer;
      position: relative;
      color: var(--text-muted);
    }
    
    .tab-btn.active {
      color: var(--primary);
    }
    
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1.5px;
      left: 0;
      right: 0;
      height: 3px;
      background-color: var(--accent);
    }
    
    .tab-panel {
      display: none;
    }
    
    .tab-panel.active {
      display: block;
      animation: fadeIn 0.4s ease;
    }
    
    .specs-table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .specs-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      font-size: 14px;
    }
    
    .specs-table td:first-child {
      font-weight: 700;
      color: var(--primary);
      width: 30%;
    }
    
    @media (max-width: 768px) {
      .details-layout {
        grid-template-columns: 1fr;
        gap: 30px;
      }
    }
  </style>
</head>
