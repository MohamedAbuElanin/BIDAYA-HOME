<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="site_title">تفاصيل المنتج | بداية هوم</title>
  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Core stylesheet -->
  <link rel="stylesheet" href="../assets/css/style.css">
  
  <style>
    /* Details Page Specific CSS */
    .details-layout {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 40px;
      margin-top: 30px;
    }
    
    .gallery-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .main-img-view {
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      overflow: hidden;
      background-color: white;
      aspect-ratio: 1.2;
    }
    
    .main-img-view img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: var(--transition);
    }
    
    .thumbnails-list {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
    }
    
    .thumb-item {
      width: 80px;
      height: 80px;
      border: 2px solid var(--border-color);
      border-radius: var(--radius-sm);
      overflow: hidden;
      cursor: pointer;
      flex-shrink: 0;
      transition: var(--transition);
      background-color: white;
    }
    
    .thumb-item.active, .thumb-item:hover {
      border-color: var(--accent);
      transform: scale(1.05);
    }
    
    .thumb-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    /* Product Info panel */
    .info-panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .details-category {
      font-size: 13px;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 600;
    }
    
    .details-name {
      font-size: 30px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1.3;
    }
    
    .details-price-wrapper {
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1.5px solid var(--border-color);
      padding-bottom: 20px;
    }
    
    .details-price-current {
      font-size: 26px;
      font-weight: 800;
      color: var(--primary);
    }
    
    .details-price-old {
      font-size: 18px;
      color: var(--text-light);
      text-decoration: line-through;
    }
    
    .stock-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--radius-full);
      font-size: 13px;
      font-weight: 600;
    }
    
    .stock-badge.in {
      background-color: rgba(46, 125, 50, 0.1);
      color: var(--success);
    }
    
    .stock-badge.out {
      background-color: rgba(211, 47, 47, 0.1);
      color: var(--danger);
    }
    
    .qty-adder-wrapper {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 10px 0;
    }
    
    .qty-selector {
      display: flex;
      align-items: center;
      border: 1.5px solid var(--border-color);
      border-radius: var(--radius-md);
      overflow: hidden;
      background-color: white;
    }
    
    .qty-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      background-color: #F8F8F6;
      transition: var(--transition);
    }
    
    .qty-btn:hover {
      background-color: var(--border-color);
    }
    
    .qty-input {
      width: 50px;
      text-align: center;
      font-weight: 700;
      font-size: 16px;
    }
    
    /* Technical specs and tabs */
    .description-tabs {
      margin-top: 50px;
      border-top: 1.5px solid var(--border-color);
      padding-top: 30px;
    }
    
    .tabs-header {
      display: flex;
      gap: 30px;
      border-bottom: 1.5px solid var(--border-color);
      margin-bottom: 24px;
    }
    
    .tab-btn {
      font-size: 18px;
      font-weight: 700;
      padding-bottom: 12px;
      cursor: pointer;
      position: relative;
      color: var(--text-muted);
    }
    
    .tab-btn.active {
      color: var(--primary);
    }
    
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1.5px;
      left: 0;
      right: 0;
      height: 3px;
      background-color: var(--accent);
    }
    
    .tab-panel {
      display: none;
    }
    
    .tab-panel.active {
      display: block;
      animation: fadeIn 0.4s ease;
    }
    
    .specs-table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .specs-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      font-size: 14px;
    }
    
    .specs-table td:first-child {
      font-weight: 700;
      color: var(--primary);
      width: 30%;
    }
    
    @media (max-width: 768px) {
      .details-layout {
        grid-template-columns: 1fr;
        gap: 30px;
      }
    }
  </style>
</head>
<body>

  <!-- Sticky Header -->
  <header id="global-header"></header>

  <main class="container" style="padding-top: 30px;">
    <!-- Breadcrumb -->
    <div class="breadcrumb">
      <a href="../index.html" data-i18n="nav_home">الرئيسية</a>
      <span class="breadcrumb-separator">/</span>
      <a href="products.html" data-i18n="nav_categories">المنتجات</a>
      <span class="breadcrumb-separator">/</span>
      <span id="breadcrumb-product-name">تفاصيل المنتج</span>
    </div>

    <!-- Details Shell -->
    <div class="details-layout" id="product-details-content">
      <!-- Dynamically filled on load -->
    </div>

    <!-- Description & Specs Tabs -->
    <section class="description-tabs">
      <div class="tabs-header">
        <div class="tab-btn active" id="tab-btn-desc" onclick="switchTab('desc')">الوصف</div>
        <div class="tab-btn" id="tab-btn-specs" onclick="switchTab('specs')">المواصفات الفنية</div>
      </div>
      
      <div class="tab-panel active" id="tab-panel-desc">
        <p id="product-full-desc" style="line-height: 1.8; color:var(--text); font-size:15px;">
          <!-- Injected -->
        </p>
      </div>
      
      <div class="tab-panel" id="tab-panel-specs">
        <table class="specs-table" id="product-specs-table">
          <!-- Injected -->
        </table>
      </div>
    </section>

    <!-- Related Products -->
    <section class="section" style="margin-top: 60px;">
      <div class="section-title-wrapper">
        <h2 class="section-title">منتجات قد تعجبك</h2>
      </div>
      <div class="grid grid-4" id="related-products-grid">
        <!-- Injected -->
      </div>
    </section>
  </main>

  <!-- Global Footer -->
  <footer id="global-footer"></footer>

  <!-- Scripts -->
  <script src="../js/products-data.js"></script>
  <script src="../js/main.js"></script>
  
  <script>
    // Tab switching controller
    function switchTab(tabId) {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
      
      document.getElementById(`tab-btn-${tabId}`).classList.add("active");
      document.getElementById(`tab-panel-${tabId}`).classList.add("active");
    }

    document.addEventListener("DOMContentLoaded", () => {
      if (!window.BIDAYA_DATA) return;

      const { products } = window.BIDAYA_DATA;
      const lang = window.BIDAYA_APP ? window.BIDAYA_APP.currentLang() : "ar";
      
      // Extract Product ID from URL
      const urlParams = new URLSearchParams(window.location.search);
      const prodId = urlParams.get("id");

      // Find product in DB registry
      const product = products.find(p => p.id === prodId);
      if (!product) {
        // Redirect to 404
        window.location.href = "not-found.html";
        return;
      }

      // 1. Update Document Title & Breadcrumb
      const prodName = lang === "ar" ? product.nameAr : product.nameEn;
      document.title = `${prodName} | بداية هوم`;
      document.getElementById("breadcrumb-product-name").textContent = prodName;

      // 2. Render Product Details (Gallery + Info panel)
      const detailsContainer = document.getElementById("product-details-content");
      const isOutOfStock = product.stock === "out-of-stock";
      const availabilityText = isOutOfStock
        ? (lang === "ar" ? "غير متوفر" : "Out of Stock")
        : (lang === "ar" ? "متوفر في المخزن" : "In Stock");
      
      const stockBadgeClass = isOutOfStock ? "out" : "in";
      const stockIcon = isOutOfStock ? "fa-circle-xmark" : "fa-circle-check";
      
      const discountBadgeHTML = product.discount 
        ? `<div class="badge-discount" style="position:static; margin-bottom: 0;">${product.discount}% ${lang === "ar" ? "خصم" : "OFF"}</div>` 
        : '';
        
      // Build thumbnails elements
      const allImages = product.images || [product.image];
      const thumbnailsHTML = allImages.map((img, idx) => `
        <div class="thumb-item ${idx === 0 ? "active" : ""}" onclick="changeMainImage('${img}', this)">
          <img src="${img}" alt="${prodName}">
        </div>
      `).join('');

      detailsContainer.innerHTML = `
        <!-- Gallery -->
        <div class="gallery-container">
          <div class="main-img-view flex-center">
            <img src="${product.image}" id="main-product-img" alt="${prodName}">
          </div>
          <div class="thumbnails-list">
            ${thumbnailsHTML}
          </div>
        </div>
        
        <!-- Info Panel -->
        <div class="info-panel">
          <div>
            <div class="details-category">${product.category}</div>
            <h1 class="details-name">${prodName}</h1>
          </div>
          
          <div class="details-price-wrapper">
            <span class="details-price-current">${product.price} EGP</span>
            ${product.oldPrice ? `<span class="details-price-old">${product.oldPrice} EGP</span>` : ''}
            ${discountBadgeHTML}
          </div>
          
          <div>
            <span class="stock-badge ${stockBadgeClass}">
              <i class="fa-solid ${stockIcon}"></i>
              <span>${availabilityText}</span>
            </span>
          </div>
          
          <p style="color:var(--text-muted); font-size:15px; border-bottom: 1.5px solid var(--border-color); padding-bottom:20px;">
            ${lang === "ar" ? product.descriptionAr.substring(0, 150) + "..." : product.descriptionEn.substring(0, 150) + "..."}
          </p>
          
          <div class="qty-adder-wrapper">
            <span style="font-weight: 700;">${lang === "ar" ? "الكمية:" : "Quantity:"}</span>
            <div class="qty-selector">
              <button class="qty-btn" onclick="modifyQty(-1)" ${isOutOfStock ? "disabled" : ""}><i class="fa-solid fa-minus"></i></button>
              <input type="number" id="qty-count-input" class="qty-input" value="1" min="1" readonly>
              <button class="qty-btn" onclick="modifyQty(1)" ${isOutOfStock ? "disabled" : ""}><i class="fa-solid fa-plus"></i></button>
            </div>
          </div>
          
          <div style="display: flex; gap: 16px; margin-top:10px;">
            <button class="btn btn-primary" style="flex-grow: 1; padding: 14px;" ${isOutOfStock ? "disabled" : ""} onclick="addToCartTrigger()">
              <i class="fa-solid fa-cart-plus"></i>
              <span data-i18n="card_add_to_cart">${lang === "ar" ? "أضف للسلة" : "Add to Cart"}</span>
            </button>
            <a href="checkout.html" class="btn btn-secondary" style="padding: 14px;" ${isOutOfStock ? "disabled" : ""} onclick="buyNowTrigger()">
              <span>${lang === "ar" ? "شراء الآن" : "Buy Now"}</span>
            </a>
          </div>
        </div>
      `;

      // 3. Render tabs content (Description & Specs)
      document.getElementById("product-full-desc").textContent = lang === "ar" ? product.descriptionAr : product.descriptionEn;

      const specs = lang === "ar" ? product.specsAr : product.specsEn;
      const specsTable = document.getElementById("product-specs-table");
      specsTable.innerHTML = Object.entries(specs).map(([key, value]) => `
        <tr>
          <td>${key}</td>
          <td>${value}</td>
        </tr>
      `).join('');

      // 4. Render related items
      const relatedGrid = document.getElementById("related-products-grid");
      const related = products.filter(p => p.category === product.category && p.id !== product.id).slice(0, 4);
      
      if (related.length === 0) {
        relatedGrid.parentElement.style.display = "none";
      } else {
        relatedGrid.innerHTML = related.map(p => {
          const rName = lang === "ar" ? p.nameAr : p.nameEn;
          const viewText = lang === "ar" ? "التفاصيل" : "Details";
          const isRStockOut = p.stock === "out-of-stock";
          const rBadgeHTML = p.discount ? `<div class="badge-discount">${p.discount}% ${lang === "ar" ? "خصم" : "OFF"}</div>` : '';
          const rOutBadgeHTML = isRStockOut ? `<div class="badge-out">${lang === "ar" ? "نفد" : "SOLD OUT"}</div>` : '';
          
          return `
            <div class="product-card">
              <div class="card-img-wrapper">
                <img src="${p.image}" alt="${rName}" loading="lazy">
                ${rBadgeHTML}
                ${rOutBadgeHTML}
              </div>
              <div class="card-info">
                <div class="card-category">${p.category}</div>
                <a href="products-details.html?id=${p.id}" class="card-name">${rName}</a>
                <div class="card-price-container">
                  <span class="price-current">${p.price} EGP</span>
                  ${p.oldPrice ? `<span class="price-old">${p.oldPrice} EGP</span>` : ''}
                </div>
                <div class="card-actions">
                  <a href="products-details.html?id=${p.id}" class="btn btn-outline" style="padding: 10px 16px; font-size:13px;">${viewText}</a>
                  <button class="btn btn-primary" style="padding: 10px 16px; font-size:13px;" ${isRStockOut ? "disabled" : ""} onclick="BIDAYA_APP.cart.add('${p.id}', 1)">
                    <i class="fa-solid fa-cart-plus"></i>
                  </button>
                </div>
              </div>
            </div>
          `;
        }).join('');
      }

      // Quantity modifier triggers
      window.modifyQty = function (amount) {
        const input = document.getElementById("qty-count-input");
        let val = parseInt(input.value) + amount;
        if (val < 1) val = 1;
        input.value = val;
      };

      // Add to Cart handler
      window.addToCartTrigger = function () {
        const qty = parseInt(document.getElementById("qty-count-input").value);
        BIDAYA_APP.cart.add(product.id, qty);
      };

      // Buy Now handler
      window.buyNowTrigger = function () {
        const qty = parseInt(document.getElementById("qty-count-input").value);
        BIDAYA_APP.cart.add(product.id, qty);
      };

      // Change gallery view
      window.changeMainImage = function (imgSrc, element) {
        document.getElementById("main-product-img").src = imgSrc;
        document.querySelectorAll(".thumb-item").forEach(t => t.classList.remove("active"));
        element.classList.add("active");
      };
    });
  </script>
</body>
</html>
